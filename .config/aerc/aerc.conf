[ui]
index-columns    = name<20%,subject,date>=
column-separator = " | "
sidebar-width    = 9
new-message-bell = false
styleset-name    = custom 
fuzzy-complete   = true 

[viewer]
pager         = vim -RM -c "set ls=0 nonu nornu" -
header-layout = To,From,Cc,Bcc,Date,Subject

[compose]
editor        = vim -c "set cc=65"
header-layout = From,To,Subject

[filters]
text/plain    = fmt -w 65
text/html     = pandoc -f html -t plain 
