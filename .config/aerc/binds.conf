# Binds are of the form <key sequence> = <command to run>
# To use '=' in a key sequence, substitute it with "Eq": "<Ctrl+Eq>"
# If you wish to bind #, you can wrap the key sequence in quotes: "#" = quit

?          = :help keys<Enter>
q          = :quit<Enter>
<C-n>      = :next-tab<Enter>
<C-p>      = :next-tab<Enter>
<Space>r   = :reload<Enter>
<Space>t   = :term<Enter>

[messages]
j          = :next<Enter>:align center<Enter>
k          = :prev<Enter>:align center<Enter>
g          = :select 0<Enter>:align center<Enter>
G          = :select -1<Enter>:align center<Enter>
<C-j>      = :next-folder<Enter>
<C-k>      = :prev-folder<Enter>
v          = :mark -t<Enter>
V          = :mark -v<Enter>
<Enter>    = :view<Enter>
I          = :move Inbox<Enter>
A          = :move Archive<Enter>
T          = :move Trash<Enter>
J          = :move Junk<Enter>
m          = :compose<Enter>
rr         = :reply -a<Enter>
rq         = :reply -aq<Enter>
Rr         = :reply<Enter>
Rq         = :reply -q<Enter>
c          = :cf<Space>
$          = :term<Space>
!          = :term<Space>
|          = :pipe<Space>
/          = :search<Space>
\          = :filter<Space>
n          = :next-result<Enter>
N          = :prev-result<Enter>
<Esc>      = :clear<Enter>

[messages:folder=Drafts]
<Enter>    = :recall<Enter>

[view]
q          = :close<Enter>
O          = :open<Enter>
o          = :open<Enter>
S          = :save<Space>
|          = :pipe<Space>
<C-l>      = :open-link <Space>
rr         = :reply -a<Enter>
rq         = :reply -aq<Enter>
Rr         = :reply<Enter>
Rq         = :reply -q<Enter>
H          = :toggle-headers<Enter>
<C-k>      = :prev-part<Enter>
<C-j>      = :next-part<Enter>
J          = :next<Enter>
K          = :prev<Enter>

[compose]
# Keybindings used when the embedded terminal is not selected in the compose
# view
$noinherit = true
$ex        = <A-x>
$complete  = <C-o>
<C-k>      = :prev-field<Enter>
<C-j>      = :next-field<Enter>
<C-p>      = :prev-tab<Enter>
<C-n>      = :next-tab<Enter>

[compose::editor]
# Keybindings used when the embedded terminal is selected in the compose view
$noinherit = true
$ex        = <A-x>
<C-k>      = :prev-field<Enter>
<C-j>      = :next-field<Enter>
<C-p>      = :prev-tab<Enter>
<C-n>      = :next-tab<Enter>

[compose::review]
# Keybindings used when reviewing a message to be sent
# Inline comments are used as descriptions on the review screen
y          = :send<Enter> # Send
n          = :abort<Enter> # Abort (discard message, no confirmation)
s          = :sign<Enter> # Toggle signing of this message with your PGP key
x          = :encrypt<Enter> # Toggle encryption of this message to all recipients
v          = :preview<Enter> # Preview message
p          = :postpone<Enter> # Postpone
q          = :choose -o d discard abort -o p postpone postpone<Enter> # Abort or postpone
e          = :edit<Enter> # Edit (body and headers)
a          = :attach<Space> # Add attachment
d          = :detach<Space> # Remove attachment

[terminal]
$noinherit = true
$ex        = <A-x>
<C-p>      = :prev-tab<Enter>
<C-n>      = :next-tab<Enter>
